
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的个人博客</title>
  <style>
    body {
        background-color: #181818;
        color: #BBBBBB;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 0;
    }
    .wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }
    a {
        color: #BBBBBB;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    .site-header {
        padding: 20px 0;
        margin-bottom: 40px;
    }
    .site-title {
        font-size: 24px;
        font-weight: bold;
    }
    .page-heading {
        font-size: 32px;
        margin-bottom: 15px;
    }
    .page-intro {
        margin-bottom: 30px;
        font-size: 16px;
    }
    .home-hr {
        border: 0;
        border-top: 1px solid #333;
        margin: 30px 0;
    }
    .post-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .post-list li {
        margin-bottom: 15px;
    }
    .post-list h3 {
        margin: 0;
        font-size: 18px;
        font-weight: normal;
    }
    .site-footer {
        padding: 40px 0;
        margin-top: 40px;
        border-top: 1px solid #333;
        text-align: center;
        font-size: 14px;
    }
    /* Markdown 元素样式 */
    pre, code {
        background-color: #222;
        border-radius: 4px;
        padding: 2px 6px;
    }
    pre {
        padding: 15px;
        overflow-x: auto;
    }
    pre code {
        padding: 0;
        background-color: transparent;
    }
    blockquote {
        border-left: 4px solid #444;
        margin: 0;
        padding-left: 15px;
        color: #999;
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="wrapper">
    <a class="site-title" rel="author" href="/">My Blog</a>
  </div>
</header>
<main class="page-content" aria-label="Content">

      <div class="wrapper">
        <article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
          <header class="post-header">
            <h1 class="post-title p-name" itemprop="name headline" style="margin-bottom: 5px;">test</h1>
            <p class="post-meta" style="color: #828282; margin-bottom: 20px;">
              <time class="dt-published" datetime="2026-04-24" itemprop="datePublished">
                2026-04-24
              </time>
            </p>
          </header>
          <div class="post-content e-content" itemprop="articleBody" style="line-height: 1.8; font-size: 16px;">
            <p>测试一下</p>
          </div>
        </article>
      </div>
    </main>

<footer class="site-footer">
  <div class="wrapper">
    <p>© 2026 My Blog. Powered by Markdown.</p>
  </div>
</footer>
</body>
</html>
